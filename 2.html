<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Smooth Split Scroll</title>
    <style>
        .skills-section {
            background-color: #f0f0f0; /* Light gray background */
            padding: 80px 20px;
            text-align: center;
            min-height: 100vh;
        }

        .skills-header h2 {
            display: inline-block;
            border: 4px solid #000;
            padding: 15px 60px;
            font-size: 24px;
            letter-spacing: 5px;
            margin-bottom: 60px;
            background: transparent;
        }

        .skills-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }

        .section-label {
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-size: 18px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 60px 40px;
            justify-items: center;
        }

        .skill-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .skill-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .skill-item span {
            font-size: 14px;
            letter-spacing: 2px;
            color: #333;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* Responsive adjustment for mobile */
        @media (max-width: 600px) {
            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<section class="skills-section">
    <div class="skills-header">
        <h2>SKILLS</h2>
    </div>

    <div class="skills-container">
        <p class="section-label">USING NOW:</p>

        <div class="skills-grid">
            <div class="skill-item">
                <img alt="HTML5" src="html5-icon.png">
                <span>HTML5</span>
            </div>
            <div class="skill-item">
                <img alt="CSS3" src="css3-icon.png">
                <span>CSS3</span>
            </div>
            <div class="skill-item">
                <img alt="SASS" src="sass-icon.png">
                <span>SASS</span>
            </div>
            <div class="skill-item">
                <img alt="JAVASCRIPT" src="js-icon.png">
                <span>JAVASCRIPT</span>
            </div>
            <div class="skill-item">
                <img alt="REACT" src="react-icon.png">
                <span>REACT</span>
            </div>
            <div class="skill-item">
                <img alt="BOOTSTRAP" src="bootstrap-icon.png">
                <span>BOOTSTRAP</span>
            </div>
            <div class="skill-item">
                <img alt="GIT" src="git-icon.png">
                <span>GIT</span>
            </div>
            <div class="skill-item">
                <img alt="FIGMA" src="figma-icon.png">
                <span>FIGMA</span>
            </div>
        </div>
    </div>
</section>
</body>
</html>
